<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>LMS for Waiter</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #c1eff2;
            text-align: center;
        }

        h1 {
            margin-top: 40px;
            color: #333;
        }

        .container {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin: 50px;
            flex-wrap: wrap;
        }

        .box {
            width: 300px;
            height: 220px;
            background-color:  #83e5ee
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            padding: 20px;
            transition: 0.3s;
        }

        .box:hover {
            transform: translateY(-5px);
        }

        video {
            width: 100%;
            border-radius: 8px;
        }

        .plus-box {
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 50px;
            color: #555;
            cursor: pointer;
        }


        .plus-box:hover {
            background-color: #e9ecef;
        }

        .header-container {
            width: 100%;
            padding: 25px 0;
            border: 2px solid #83e5ee;
            border-radius: 20px 20px 20px 20px;
            background-color: #83e5ee;
            text-align: center;
        }
    </style>
</head>

<body>

    <div class="header-container">
        <h1>LMS for Waiter</h1>
    </div>

    <div class="container">

        <div class="box">
            <h3>How to Serve Tea</h3>
            <video controls>
                <source src="tea-serving-tutorial.mp4" type="video/mp4">
                Your browser does not support video.
            </video>
        </div>

        <div class="box">
            <h3>How to Greet a Customer</h3>
            <video controls>
                <source src="order-tutorial.mp4" type="video/mp4">
                Your browser does not support video.
            </video>
        </div>

        <div class="box plus-box">
            +
        </div>

    </div>

</body>

</html>
